services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_DB: opticarex
      POSTGRES_USER: opticarex
      POSTGRES_PASSWORD: ${DB_PASSWORD:-opticarex_dev}
    ports:
      - "5432:5432"
    volumes:
      - opticarex_pg:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py runserver 0.0.0.0:8000"
    env_file: .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.dev
      - DATABASE_URL=postgresql://opticarex:${DB_PASSWORD:-opticarex_dev}@db:5432/opticarex
      - REDIS_URL=redis://redis:6379/0
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      - db
      - redis

  worker:
    build: ./backend
    command: celery -A config worker -l info
    env_file: .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.dev
      - DATABASE_URL=postgresql://opticarex:${DB_PASSWORD:-opticarex_dev}@db:5432/opticarex
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./backend:/app
    depends_on:
      - db
      - redis

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_BASE_URL=http://localhost:8000/api

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  opticarex_pg:
